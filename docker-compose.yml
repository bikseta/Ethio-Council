version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ecfe_user
      POSTGRES_PASSWORD: ecfe_pass
      POSTGRES_DB: ecfe_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - ethio-council-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecfe_user -d ecfe_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
    ports:
      - "4566:4566"
    networks:
      - ethio-council-network

  core-platform-service:
    build: ./services/core-platform-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ecfe_user:ecfe_pass@db:5432/ecfe_db
      - SECRET_KEY=${SECRET_KEY:-ecfe-dev-secret-key-2024}
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - FRONTEND_URL=http://localhost:3001
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_started
    networks:
      - ethio-council-network
    volumes:
      - ./services/core-platform-service:/app

  gis-registration-service:
    build: ./services/gis-registration-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://ecfe_user:ecfe_pass@db:5432/ecfe_db
      - SECRET_KEY=${SECRET_KEY:-ecfe-dev-secret-key-2024}
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_started
    networks:
      - ethio-council-network
    volumes:
      - ./services/gis-registration-service:/app

  crisis-response-service:
    build: ./services/crisis-response-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://ecfe_user:ecfe_pass@db:5432/ecfe_db
      - SECRET_KEY=${SECRET_KEY:-ecfe-dev-secret-key-2024}
      - AWS_ENDPOINT_URL=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_started
    networks:
      - ethio-council-network
    volumes:
      - ./services/crisis-response-service:/app

  analytics-service:
    build: ./services/analytics-service
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://ecfe_user:ecfe_pass@db:5432/ecfe_db
      - SECRET_KEY=${SECRET_KEY:-ecfe-dev-secret-key-2024}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ethio-council-network
    volumes:
      - ./services/analytics-service:/app

  frontend:
    build: ./frontend
    ports:
      - "3001:3000"
    environment:
      - REACT_APP_CORE_API_URL=http://localhost:8000
      - REACT_APP_GIS_API_URL=http://localhost:8001
      - REACT_APP_CRISIS_API_URL=http://localhost:8002
      - REACT_APP_ANALYTICS_API_URL=http://localhost:8003
      - REACT_APP_MAPBOX_TOKEN=${MAPBOX_TOKEN:-}
    depends_on:
      - core-platform-service
      - gis-registration-service
      - crisis-response-service
      - analytics-service
    networks:
      - ethio-council-network

networks:
  ethio-council-network:
    driver: bridge

volumes:
  postgres_data:
