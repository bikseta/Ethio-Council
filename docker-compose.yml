services:
  # PostgreSQL with PostGIS
  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: ethio-council-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ethio_council}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ethio-council-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ethio_council}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Core Platform Service
  core-platform-service:
    build:
      context: ./services/core-platform-service
      dockerfile: Dockerfile
    container_name: ethio-council-core
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ethio_council}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ethio-council-network
    volumes:
      - ./services/core-platform-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # GIS Service
  gis-service:
    build:
      context: ./services/gis-service
      dockerfile: Dockerfile
    container_name: ethio-council-gis
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ethio_council}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ethio-council-network
    volumes:
      - ./services/gis-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Analytics Service
  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: ethio-council-analytics
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ethio_council}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ethio-council-network
    volumes:
      - ./services/analytics-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Crisis Service
  crisis-service:
    build:
      context: ./services/crisis-service
      dockerfile: Dockerfile
    container_name: ethio-council-crisis
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ethio_council}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set in .env}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ethio-council-network
    volumes:
      - ./services/crisis-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ethio-council-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_CORE_API_URL=${REACT_APP_CORE_API_URL:-http://localhost:8001}
      - REACT_APP_GIS_API_URL=${REACT_APP_GIS_API_URL:-http://localhost:8002}
      - REACT_APP_ANALYTICS_API_URL=${REACT_APP_ANALYTICS_API_URL:-http://localhost:8003}
      - REACT_APP_CRISIS_API_URL=${REACT_APP_CRISIS_API_URL:-http://localhost:8004}
      - REACT_APP_MAPBOX_TOKEN=${REACT_APP_MAPBOX_TOKEN:-your_token_here}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - core-platform-service
    networks:
      - ethio-council-network

networks:
  ethio-council-network:
    driver: bridge

volumes:
  postgres_data:
