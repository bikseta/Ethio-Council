services:
  localstack:
    image: localstack/localstack:latest
    container_name: ethio-council-localstack
    ports:
      - "4566:4566"
      - "4571:4571"
      - "8056:8080"
    environment:
      - SERVICES=s3,sqs,iam,sts,lambda,cloudwatchlogs
      - DEBUG=1
      - PERSISTENCE=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./localstack_data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - ethio-council-network

  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: ethio-council-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ethio_council}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ethio-council-network

  core-platform-service:
    build:
      context: ./services/core-platform-service
      dockerfile: Dockerfile
    container_name: ethio-council-core-platform
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-ethio_council}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here-change-in-production}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - postgres
      - localstack
    networks:
      - ethio-council-network
    volumes:
      - ./services/core-platform-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  gis-registration-service:
    build:
      context: ./services/gis-registration-service
      dockerfile: Dockerfile
    container_name: ethio-council-gis-registration
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-ethio_council}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here-change-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - postgres
    networks:
      - ethio-council-network
    volumes:
      - ./services/gis-registration-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: ethio-council-analytics
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-ethio_council}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here-change-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - postgres
    networks:
      - ethio-council-network
    volumes:
      - ./services/analytics-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  crisis-response-service:
    build:
      context: ./services/crisis-response-service
      dockerfile: Dockerfile
    container_name: ethio-council-crisis-response
    ports:
      - "8004:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-ethio_council}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here-change-in-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - postgres
    networks:
      - ethio-council-network
    volumes:
      - ./services/crisis-response-service:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ethio-council-frontend
    ports:
      - "3001:3000"
    environment:
      - REACT_APP_CORE_API_URL=http://localhost:8001
      - REACT_APP_GIS_API_URL=http://localhost:8002
      - REACT_APP_ANALYTICS_API_URL=http://localhost:8003
      - REACT_APP_CRISIS_API_URL=http://localhost:8004
      - REACT_APP_MAPBOX_TOKEN=${MAPBOX_TOKEN:-your-mapbox-token-here}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - core-platform-service
      - gis-registration-service
      - analytics-service
      - crisis-response-service
    networks:
      - ethio-council-network

networks:
  ethio-council-network:
    driver: bridge

volumes:
  postgres_data:
